name: Security Check

on:
  push:
    branches: [main,test]
  schedule:
  - cron: '0 0 * * 0'

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: docker compose -f docker-compose.test.yml build
    - uses: aquasecurity/trivy-action@master
      with:
        image-ref: flask_web
        severity: CRITICAL,HIGH
        exit-code: '1'