services:

  web:
    container_name: transac_flask
    build: ./src
    ports:
      - 5000:5000
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./src/migrations:/app/migrations
      - ./src/app/templates:/app/app/templates # only for dev mode

  db:
    container_name: transac_db
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: